<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Search Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.3.2/build/index.min.js"></script>
</head>

<body>

<a href="index.html" class="back-btn">←</a>

<div class="wrapper">
  <h1>Word Search Generator</h1>
  <p>Generate multilingual word‑search puzzles directly in your browser.</p>

  <div class="controls">

    <div>
      <label>Word(s)</label>
      <textarea id="words-input" placeholder="Type words, separated by commas or new lines"></textarea>
    </div>

    <div>
      <label>Language</label>
      <select id="language-select"></select>
    </div>

    <div>
      <label>Grid Size</label>
      <input id="size-input" type="number" min="8" max="25" value="12" />
    </div>

    <div>
      <label>Directions</label>
      <select id="directions-select" multiple>
        <option value="H">Horizontal</option>
        <option value="HR">Horizontal Reversed</option>
        <option value="V">Vertical</option>
        <option value="VR">Vertical Reversed</option>
        <option value="D">Diagonal</option>
        <option value="DR">Diagonal Reversed</option>
      </select>
    </div>

  </div>

  <div class="actions">
    <button id="generate-btn" class="btn">Generate</button>
  </div>

  <div class="download-row">
    <select id="image-format">
      <option value="">Download as image</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="jpeg">JPEG</option>
      <option value="webp">WEBP</option>
    </select>

    <select id="doc-format">
      <option value="">Download as document</option>
      <option value="pdf">PDF</option>
      <option value="docx">DOCX</option>
    </select>
  </div>

  <div id="grid-container"></div>
</div>

<script>
/* --- languages --- */
const LANGUAGES = [
  { code: 'en', label: 'English', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'es', label: 'Spanish', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ' },
  { code: 'fr', label: 'French', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'de', label: 'German', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'pt', label: 'Portuguese', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'it', label: 'Italian', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'he', label: 'Hebrew', dir: 'rtl', alphabet: 'אבגדהוזחטיכלמנסעפצקרשת' }
];

const languageSelect = document.getElementById('language-select');
const wordsInput = document.getElementById('words-input');
const sizeInput = document.getElementById('size-input');
const gridContainer = document.getElementById('grid-container');
const directionsSelect = document.getElementById('directions-select');

LANGUAGES.forEach(lang => {
  const opt = document.createElement('option');
  opt.value = lang.code;
  opt.textContent = lang.label;
  languageSelect.appendChild(opt);
});

/* --- helpers --- */
function getLanguageConfig() {
  return LANGUAGES.find(l => l.code === languageSelect.value);
}

function getWords() {
  return wordsInput.value
    .split(/[\n,]+/)
    .map(w => w.trim())
    .filter(w => w.length > 0);
}

function getDirections() {
  return Array.from(directionsSelect.selectedOptions).map(o => o.value);
}

function createEmptyGrid(n) {
  return Array.from({ length: n }, () => Array(n).fill(''));
}

function validateWord(word, lang) {
  const clean = word.replace(/\s+/g, '');
  const isHebrew = lang.code === 'he';

  const hebrewRegex = /^[אבגדהוזחטיכלמנסעפצקרשת]+$/;
  const latinRegex = /^[A-Za-zÑñÁÉÍÓÚÜáéíóúü]+$/;

  if (isHebrew && !hebrewRegex.test(clean)) return false;
  if (!isHebrew && !latinRegex.test(clean)) return false;

  return true;
}

/* --- placement --- */
function tryPlace(grid, word, lang, direction) {
  const n = grid.length;
  const isHebrew = lang.code === 'he';

  let clean = word.replace(/\s+/g, '');
  if (!isHebrew) clean = clean.toUpperCase();
  if (isHebrew) clean = clean.split('').reverse().join('');

  const len = clean.length;

  const dirs = {
    H:  [0, 1],
    HR: [0, -1],
    V:  [1, 0],
    VR: [-1, 0],
    D:  [1, 1],
    DR: [-1, -1]
  };

  const [dr, dc] = dirs[direction];

  const cells = [];
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      cells.push([r, c]);
    }
  }

  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }

  for (const [r, c] of cells) {
    let ok = true;

    for (let i = 0; i < len; i++) {
      const rr = r + dr * i;
      const cc = c + dc * i;

      if (rr < 0 || rr >= n || cc < 0 || cc >= n) {
        ok = false;
        break;
      }

      if (grid[rr][cc] && grid[rr][cc] !== clean[i]) {
        ok = false;
        break;
      }
    }

    if (ok) {
      for (let i = 0; i < len; i++) {
        const rr = r + dr * i;
        const cc = c + dc * i;
        grid[rr][cc] = clean[i];
      }
      return true;
    }
  }

  return false;
}

function placeWords(grid, words, lang, directions) {
  for (const word of words) {
    if (!validateWord(word, lang)) return false;

    let placed = false;

    for (let attempt = 0; attempt < 200 && !placed; attempt++) {
      const dir = directions[Math.floor(Math.random() * directions.length)];
      placed = tryPlace(grid, word, lang, dir);
    }

    if (!placed) return false;
  }

  return true;
}

/* --- fill --- */
function fillRandomLetters(grid, alphabet) {
  const chars = alphabet.split('');
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      if (!grid[r][c]) {
        grid[r][c] = chars[Math.floor(Math.random() * chars.length)];
      }
    }
  }
}

/* --- render --- */
function renderGrid(grid, lang) {
  gridContainer.innerHTML = '';
  const table = document.createElement('table');
  table.dir = lang.dir;

  grid.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });

  gridContainer.appendChild(table);
}

/* --- generate --- */
document.getElementById('generate-btn').onclick = () => {
  const lang = getLanguageConfig();
  const size = Math.max(8, Math.min(25, parseInt(sizeInput.value)));
  const words = getWords();
  const directions = getDirections();

  if (words.length === 0) return alert('Please enter at least one word.');
  if (directions.length === 0) return alert('Please select at least one direction.');

  const grid = createEmptyGrid(size);

  if (!placeWords(grid, words, lang, directions)) {
    alert('Could not place all words.');
    return;
  }

  fillRandomLetters(grid, lang.alphabet);
  renderGrid(grid, lang);
};

/* --- create clean black/white table for export --- */
function createCleanTable() {
  const table = document.createElement('table');
  table.style.borderCollapse = 'collapse';
  table.style.background = 'white';

  const rows = gridContainer.querySelectorAll('tr');

  rows.forEach(row => {
    const tr = document.createElement('tr');

    row.querySelectorAll('td').forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell.textContent;
      td.style.width = '40px';
      td.style.height = '40px';
      td.style.border = '2px solid black';
      td.style.textAlign = 'center';
      td.style.fontSize = '26px';
      td.style.fontWeight = 'bold';
      td.style.color = 'black';
      td.style.background = 'white';
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  return table;
}

/* --- image export --- */
document.getElementById('image-format').onchange = async (e) => {
  const format = e.target.value;
  if (!format) return;

  const table = createCleanTable();
  document.body.appendChild(table);
  table.style.position = 'fixed';
  table.style.top = '-9999px';

  const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
  const link = document.createElement('a');
  link.download = 'word-search.' + format;
  link.href = canvas.toDataURL('image/' + format);
  link.click();

  table.remove();
  e.target.value = '';
};

/* --- document export --- */
document.getElementById('doc-format').onchange = async (e) => {
  const format = e.target.value;
  if (!format) return;

  const table = createCleanTable();
  document.body.appendChild(table);
  table.style.position = 'fixed';
  table.style.top = '-9999px';

  if (format === 'pdf') {
    const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
    const img = canvas.toDataURL('image/png');

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const width = pdf.internal.pageSize.getWidth() - 20;
    const height = canvas.height * (width / canvas.width);

    pdf.addImage(img, 'PNG', 10, 10, width, height);
    pdf.save('word-search.pdf');
  }

  if (format === 'docx') {
    const { Document, Packer, Paragraph, TextRun } = window.docx;

    const rows = Array.from(table.querySelectorAll('tr')).map(tr =>
      new Paragraph({
        children: [
          new TextRun(
            Array.from(tr.querySelectorAll('td'))
              .map(td => td.textContent)
              .join(' ')
          )
        ]
      })
    );

    const doc = new Document({ sections: [{ children: rows }] });

    const blob = await Packer.toBlob(doc);
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'word-search.docx';
    link.click();
  }

  table.remove();
  e.target.value = '';
};
</script>

</body>
</html>

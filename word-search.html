<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Search Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/docx@7.7.0/build/index.js"></script>
</head>

<body>

<a href="index.html" class="back-btn">←</a>

<div class="wrapper">
  <h1>Word Search Generator</h1>
  <p>Generate multilingual word‑search puzzles directly in your browser.</p>

  <div class="controls">

    <div>
      <label>Word(s)</label>
      <textarea id="words-input" placeholder="Type words, separated by commas or new lines"></textarea>
    </div>

    <div>
      <label>Language</label>
      <select id="language-select"></select>
    </div>

    <div>
      <label>Grid Size</label>
      <input id="size-input" type="number" min="8" max="25" value="12" />
    </div>

    <div>
      <label>Directions</label>
      <div id="directions-box" class="direction-box">
    
        <div class="direction-item">
          <input type="checkbox" value="H" id="dir-h">
          <label for="dir-h">Horizontal</label>
        </div>
    
        <div class="direction-item">
          <input type="checkbox" value="HR" id="dir-hr">
          <label for="dir-hr">Horizontal Reversed</label>
        </div>
    
        <div class="direction-item">
          <input type="checkbox" value="V" id="dir-v">
          <label for="dir-v">Vertical</label>
        </div>
    
        <div class="direction-item">
          <input type="checkbox" value="VR" id="dir-vr">
          <label for="dir-vr">Vertical Reversed</label>
        </div>
    
        <div class="direction-item">
          <input type="checkbox" value="D" id="dir-d">
          <label for="dir-d">Diagonal</label>
        </div>
    
        <div class="direction-item">
          <input type="checkbox" value="DR" id="dir-dr">
          <label for="dir-dr">Diagonal Reversed</label>
        </div>
    
      </div>
    </div>

  </div>

  <div class="actions">
    <button id="generate-btn" class="btn">Generate</button>
    <button id="download-image-btn" class="btn secondary">Download as image</button>
    <button id="download-doc-btn" class="btn secondary">Download as document</button>
  </div>

  <div id="grid-container"></div>
</div>

<script>
/* LANGUAGES */
const LANGUAGES = [
  { code: 'en', label: 'English | English', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'es', label: 'Spanish | Español', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ' },
  { code: 'fr', label: 'French | Français', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'de', label: 'German | Deutsch', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'pt', label: 'Portuguese | Português', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'it', label: 'Italian | Italiano', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
  { code: 'he', label: 'Hebrew | עברית', dir: 'rtl', alphabet: 'אבגדהוזחטיכלמנסעפצקרשת' }
];

const languageSelect = document.getElementById('language-select');
const wordsInput = document.getElementById('words-input');
const sizeInput = document.getElementById('size-input');
const gridContainer = document.getElementById('grid-container');
const directionsSelect = document.getElementById('directions-select');

LANGUAGES.forEach(lang => {
  const opt = document.createElement('option');
  opt.value = lang.code;
  opt.textContent = lang.label;
  languageSelect.appendChild(opt);
});

/* HELPERS */
function getLanguageConfig() {
  return LANGUAGES.find(l => l.code === languageSelect.value);
}

function getWords() {
  return wordsInput.value
    .split(/[\n,]+/)
    .map(w => w.trim())
    .filter(w => w.length > 0);
}

function getDirections() {
  return Array.from(document.querySelectorAll('#directions-box input:checked'))
    .map(cb => cb.value);
}

function createEmptyGrid(n) {
  return Array.from({ length: n }, () => Array(n).fill(''));
}

function validateWord(word, lang) {
  const clean = word.replace(/\s+/g, '');
  const isHebrew = lang.code === 'he';

  const hebrewRegex = /^[אבגדהוזחטיכלמנסעפצקרשת]+$/;
  const latinRegex = /^[A-Za-zÑñÁÉÍÓÚÜáéíóúü]+$/;

  if (isHebrew && !hebrewRegex.test(clean)) return false;
  if (!isHebrew && !latinRegex.test(clean)) return false;

  return true;
}

/* WORD PLACEMENT */
function tryPlace(grid, word, lang, direction) {
  const n = grid.length;
  const isHebrew = lang.code === 'he';

  let clean = word.replace(/\s+/g, '');
  if (!isHebrew) clean = clean.toUpperCase();
  if (isHebrew) clean = clean.split('').reverse().join('');

  const len = clean.length;

  const dirs = {
    H:  [0, 1],
    HR: [0, -1],
    V:  [1, 0],
    VR: [-1, 0],
    D:  [1, 1],
    DR: [-1, -1]
  };

  const [dr, dc] = dirs[direction];

  const cells = [];
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      cells.push([r, c]);
    }
  }

  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }

  for (const [r, c] of cells) {
    let ok = true;

    for (let i = 0; i < len; i++) {
      const rr = r + dr * i;
      const cc = c + dc * i;

      if (rr < 0 || rr >= n || cc < 0 || cc >= n) {
        ok = false;
        break;
      }

      if (grid[rr][cc] && grid[rr][cc] !== clean[i]) {
        ok = false;
        break;
      }
    }

    if (ok) {
      for (let i = 0; i < len; i++) {
        const rr = r + dr * i;
        const cc = c + dc * i;
        grid[rr][cc] = clean[i];
      }
      return true;
    }
  }

  return false;
}

function placeWords(grid, words, lang, directions) {
  for (const word of words) {
    if (!validateWord(word, lang)) {
      alert('Invalid word: ' + word);
      return false;
    }

    let placed = false;

    for (let attempt = 0; attempt < 200 && !placed; attempt++) {
      const dir = directions[Math.floor(Math.random() * directions.length)];
      placed = tryPlace(grid, word, lang, dir);
    }

    if (!placed) {
      alert('Could not place word: ' + word);
      return false;
    }
  }

  return true;
}

/* FILL RANDOM LETTERS */
function fillRandomLetters(grid, alphabet) {
  const chars = alphabet.split('');
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      if (!grid[r][c]) {
        grid[r][c] = chars[Math.floor(Math.random() * chars.length)];
      }
    }
  }
}

/* RENDER GRID */
function renderGrid(grid, lang) {
  gridContainer.innerHTML = '';
  const table = document.createElement('table');
  table.dir = lang.dir;

  grid.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });

  gridContainer.appendChild(table);
}

/* GENERATE */
document.getElementById('generate-btn').onclick = () => {
  const lang = getLanguageConfig();
  const size = Math.max(8, Math.min(25, parseInt(sizeInput.value)));
  const words = getWords();
  const directions = getDirections();

  if (words.length === 0) {
    alert('Please enter at least one word.');
    return;
  }

  if (directions.length === 0) {
    alert('Please select at least one direction.');
    return;
  }

  const grid = createEmptyGrid(size);

  if (!placeWords(grid, words, lang, directions)) return;

  fillRandomLetters(grid, lang.alphabet);
  renderGrid(grid, lang);
};

/* CLEAN TABLE FOR EXPORT */
function createCleanTable() {
  const originalTable = gridContainer.querySelector('table');
  if (!originalTable) return null;

  const table = document.createElement('table');
  table.style.borderCollapse = 'collapse';
  table.style.background = 'white';

  const rows = originalTable.querySelectorAll('tr');

  rows.forEach(row => {
    const tr = document.createElement('tr');

    row.querySelectorAll('td').forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell.textContent;
      td.style.width = '40px';
      td.style.height = '40px';
      td.style.border = '2px solid black';
      td.style.textAlign = 'center';
      td.style.fontSize = '26px';
      td.style.fontWeight = 'bold';
      td.style.color = 'black';
      td.style.background = 'white';
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  return table;
}

/* DOWNLOAD IMAGE */
document.getElementById('download-image-btn').onclick = async () => {
  const table = createCleanTable();
  if (!table) {
    alert('Generate a puzzle first.');
    return;
  }

  const format = prompt('Choose image format: png, jpg, jpeg, webp');
  if (!format) return;

  const allowed = ['png', 'jpg', 'jpeg', 'webp'];
  if (!allowed.includes(format.toLowerCase())) {
    alert('Unsupported format.');
    return;
  }

  document.body.appendChild(table);
  table.style.position = 'fixed';
  table.style.top = '-9999px';

  const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
  const mime = format === 'jpg' || format === 'jpeg' ? 'image/jpeg' : 'image/' + format;
  const link = document.createElement('a');
  link.download = 'word-search.' + format;
  link.href = canvas.toDataURL(mime);
  link.click();

  table.remove();
};

/* DOWNLOAD DOCUMENT */
document.getElementById('download-doc-btn').onclick = async () => {
  const table = createCleanTable();
  if (!table) {
    alert('Generate a puzzle first.');
    return;
  }

  const format = prompt('Choose document format: pdf, docx');
  if (!format) return;

  if (format === 'pdf') {
    document.body.appendChild(table);
    table.style.position = 'fixed';
    table.style.top = '-9999px';

    const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
    const img = canvas.toDataURL('image/png');

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const width = pdf.internal.pageSize.getWidth() - 20;
    const height = canvas.height * (width / canvas.width);

    pdf.addImage(img, 'PNG', 10, 10, width, height);
    pdf.save('word-search.pdf');

    table.remove();
  }

  if (format === 'docx') {
    if (!window.docx) {
      alert('DOCX export is not supported on this device.');
      return;
    }

    const { Document, Packer, Paragraph, TextRun } = window.docx;

    const rows = Array.from(table.querySelectorAll('tr')).map(tr =>
      new Paragraph({
        children: [
          new TextRun(
            Array.from(tr.querySelectorAll('td'))
              .map(td => td.textContent)
              .join(' ')
          )
        ]
      })
    );

    const doc = new Document({ sections: [{ children: rows }] });

    const blob = await Packer.toBlob(doc);
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'word-search.docx';
    link.click();
  }
};
</script>

</body>
</html>

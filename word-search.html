<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Search Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

  <!-- ספריות להורדה -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <div class="wrapper">
    <h1>Word Search Generator</h1>
    <p>Generate multilingual word‑search puzzles directly in your browser.</p>

    <div class="controls">
      <div>
        <label>Word</label>
        <input id="word-input" type="text" placeholder="Hello / Hola / שלום" />
      </div>

      <div>
        <label>Language</label>
        <select id="language-select"></select>
      </div>

      <div>
        <label>Grid Size</label>
        <input id="size-input" type="number" min="8" max="25" value="12" />
      </div>
    </div>

    <div class="actions">
      <button id="generate-btn" class="btn">Generate</button>
      <button id="download-png-btn" class="btn secondary">Download PNG</button>
      <button id="download-pdf-btn" class="btn secondary">Download PDF</button>
    </div>

    <div id="grid-container"></div>
  </div>

  <script>
    const LANGUAGES = [
      { code: 'en', label: 'English | English', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
      { code: 'es', label: 'Spanish | Español', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ' },
      { code: 'fr', label: 'French | Français', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
      { code: 'de', label: 'German | Deutsch', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
      { code: 'pt', label: 'Portuguese | Português', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
      { code: 'it', label: 'Italian | Italiano', dir: 'ltr', alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' },
      { code: 'he', label: 'Hebrew | עברית', dir: 'rtl', alphabet: 'אבגדהוזחטיכלמנסעפצקרשת' }
    ];

    const languageSelect = document.getElementById('language-select');
    const wordInput = document.getElementById('word-input');
    const sizeInput = document.getElementById('size-input');
    const gridContainer = document.getElementById('grid-container');

    LANGUAGES.forEach(lang => {
      const opt = document.createElement('option');
      opt.value = lang.code;
      opt.textContent = lang.label;
      languageSelect.appendChild(opt);
    });

    function getLanguageConfig() {
      return LANGUAGES.find(l => l.code === languageSelect.value);
    }

    function createEmptyGrid(n) {
      return Array.from({ length: n }, () => Array(n).fill(''));
    }

    function fillRandomLetters(grid, alphabet) {
      const chars = alphabet.split('');
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < grid[r].length; c++) {
          if (!grid[r][c]) {
            grid[r][c] = chars[Math.floor(Math.random() * chars.length)];
          }
        }
      }
    }

    function placeWord(grid, word, lang) {
      const n = grid.length;
      const clean = word.replace(/\s+/g, '');
      if (!clean) return;

      const finalWord = lang.code === 'he'
        ? clean.split('').reverse().join('')
        : clean;

      if (finalWord.length > n) {
        alert('Word too long for grid size.');
        return;
      }

      const row = Math.floor(Math.random() * n);
      const start = Math.floor(Math.random() * (n - finalWord.length + 1));

      for (let i = 0; i < finalWord.length; i++) {
        grid[row][start + i] = finalWord[i];
      }
    }

    function renderGrid(grid, lang) {
      gridContainer.innerHTML = '';
      const table = document.createElement('table');
      table.dir = lang.dir;

      grid.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(cell => {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });

      gridContainer.appendChild(table);
    }

    document.getElementById('generate-btn').onclick = () => {
      const lang = getLanguageConfig();
      const size = Math.max(8, Math.min(25, parseInt(sizeInput.value)));
      const word = wordInput.value.trim();

      if (!word) return alert('Enter a word.');

      const grid = createEmptyGrid(size);
      placeWord(grid, word, lang);
      fillRandomLetters(grid, lang.alphabet);
      renderGrid(grid, lang);
    };

    document.getElementById('download-png-btn').onclick = async () => {
      const table = gridContainer.querySelector('table');
      if (!table) return alert('Generate a puzzle first.');

      const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
      const link = document.createElement('a');
      link.download = 'word-search.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    document.getElementById('download-pdf-btn').onclick = async () => {
      const table = gridContainer.querySelector('table');
      if (!table) return alert('Generate a puzzle first.');

      const canvas = await html2canvas(table, { backgroundColor: '#fff', scale: 3 });
      const img = canvas.toDataURL('image/png');

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      const width = pdf.internal.pageSize.getWidth() - 20;
      const height = canvas.height * (width / canvas.width);

      pdf.addImage(img, 'PNG', 10, 10, width, height);
      pdf.save('word-search.pdf');
    };
  </script>
</body>
</html>
